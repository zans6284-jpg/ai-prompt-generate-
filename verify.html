<!DOCTYPE html>
<html>
<head>
<title>Verify Key</title>
</head>

<body style="background:black;color:white;text-align:center;padding:40px">

<h2>Verifying API Key...</h2>

<p id="status">Mohon tunggu...</p>

<script>

async function verify(){

let key=localStorage.getItem("OPENAI_KEY")

let res=await fetch("https://api.openai.com/v1/models",{

headers:{
"Authorization":"Bearer "+key
}

})

if(res.status===200){

document.getElementById("status").innerText="API Key Valid ✔"

setTimeout(()=>{

window.location="generator.html"

},1500)

}else{

document.getElementById("status").innerText="API Key Tidak Valid"

}

}

verify()

</script>

</body>
</html>
