<!DOCTYPE html>
<html>
<head>
<title>AI Generator</title>

<style>

body{
background:#050505;
color:#00ff99;
font-family:Arial;
text-align:center;
padding:20px;
}

.card{
border:1px solid #00ff99;
padding:20px;
margin-top:20px;
box-shadow:0 0 10px #00ff99;
}

textarea,select{
width:100%;
padding:10px;
margin-top:10px;
background:black;
border:1px solid #00ff99;
color:#00ff99;
}

button{
background:#00ff99;
border:none;
padding:10px;
margin-top:10px;
width:100%;
}

</style>

</head>

<body>

<h1>AI Generator</h1>

<div class="card">

<select id="provider">
<option value="openai">OpenAI</option>
<option value="deepseek">DeepSeek</option>
<option value="gemini">Gemini</option>
</select>

<select id="model">
<option value="">Auto Model</option>
<option value="gpt-4o-mini">GPT-4o mini</option>
<option value="deepseek-chat">DeepSeek Chat</option>
<option value="gemini-pro">Gemini Pro</option>
</select>

<textarea id="apikey" placeholder="Masukkan API Key"></textarea>

<textarea id="prompt" placeholder="Masukkan prompt"></textarea>

<button onclick="generate()">Generate</button>

<textarea id="output" rows="10"></textarea>

</div>

<script>

async function generate(){

let provider=document.getElementById("provider").value
let model=document.getElementById("model").value
let key=document.getElementById("apikey").value
let prompt=document.getElementById("prompt").value

document.getElementById("output").value="Generating..."

let res = await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
provider:provider,
model:model,
key:key,
prompt:prompt
})

})

let data = await res.json()

if(provider==="gemini"){

document.getElementById("output").value =
data.candidates?.[0]?.content?.parts?.[0]?.text

}else{

document.getElementById("output").value =
data.choices?.[0]?.message?.content

}

}

</script>

</body>
</html>
