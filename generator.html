<!DOCTYPE html>
<html>
<head>
<title>AI Prompt Generator</title>

<style>

body{
background:#050505;
font-family:Arial;
color:#00ff99;
margin:0;
}

/* Cyber grid background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(#00ff9920 1px, transparent 1px),
linear-gradient(90deg,#00ff9920 1px, transparent 1px);
background-size:40px 40px;
animation:gridMove 8s linear infinite;
z-index:-1;
}

@keyframes gridMove{
0%{transform:translateY(0)}
100%{transform:translateY(40px)}
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-size:30px;
text-shadow:0 0 10px #00ff99;
}

.card{
background:#0a0a0a;
border:1px solid #00ff99;
border-radius:10px;
padding:15px;
margin-top:15px;
box-shadow:0 0 15px #00ff99;
}

select,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#000;
border:1px solid #00ff99;
color:#00ff99;
border-radius:5px;
}

button{
background:#00ff99;
border:none;
padding:10px;
margin-top:10px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.library button{
background:#111;
border:1px solid #00ff99;
color:#00ff99;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.actions button{
flex:1;
}

.status{
margin-top:10px;
font-size:14px;
}

.active{
color:#00ff99;
}

.inactive{
color:red;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">AI Generator</h1>

<div class="status" id="status"></div>


<div class="card">

<h3>AI Model Provider</h3>

<select id="provider">
<option value="openai">OpenAI</option>
<option value="deepseek">DeepSeek</option>
<option value="gemini">Gemini</option>
</select>

<select id="model">
<option value="">Auto Model</option>
<option value="gpt-4o-mini">GPT-4o mini</option>
<option value="deepseek-chat">DeepSeek Chat</option>
<option value="gemini-pro">Gemini Pro</option>
</select>

</div>


<div class="card">

<h3>Prompt Library</h3>

<div class="library">

<button onclick="setPrompt('Buat cerita RP fantasy dengan kekuatan dewa.')">Fantasy RP</button>

<button onclick="setPrompt('Buat cerita sci-fi tentang manusia yang menguasai AI.')">Sci-Fi Story</button>

<button onclick="setPrompt('Buat dialog roleplay antara pahlawan dan penjahat.')">Hero RP</button>

<button onclick="setPrompt('Buat prompt hypnotic yang kuat.')">Hypnotic</button>

</div>

</div>


<div class="card">

<h3>Prompt</h3>

<textarea id="prompt"></textarea>

<button onclick="generate()">Generate</button>

</div>


<div class="card">

<h3>Output</h3>

<textarea id="output" rows="10"></textarea>

<div class="actions">

<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>


<script>

/* ================= KEY STATUS ================= */

function checkKey(){

let openai = localStorage.getItem("OPENAI_KEY")
let deepseek = localStorage.getItem("DEEPSEEK_KEY")
let gemini = localStorage.getItem("GEMINI_KEY")

let text=""

text += openai ? "OpenAI Key Aktif | " : "OpenAI Key Tidak Ada | "
text += deepseek ? "DeepSeek Key Aktif | " : "DeepSeek Key Tidak Ada | "
text += gemini ? "Gemini Key Aktif" : "Gemini Key Tidak Ada"

document.getElementById("status").innerText=text

}

checkKey()


/* ================= PROMPT LIBRARY ================= */

function setPrompt(text){

document.getElementById("prompt").value=text

}


/* ================= GENERATE ================= */

async function generate(){

let prompt=document.getElementById("prompt").value
let provider=document.getElementById("provider").value
let model=document.getElementById("model").value

let openai=localStorage.getItem("OPENAI_KEY")
let deepseek=localStorage.getItem("DEEPSEEK_KEY")
let gemini=localStorage.getItem("GEMINI_KEY")

document.getElementById("output").value="Generating..."

try{

/* OPENAI */

if(provider==="openai"){

if(!openai){
document.getElementById("output").value="OpenAI API key belum dimasukkan"
return
}

let res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+openai
},

body:JSON.stringify({
model:model || "gpt-4o-mini",
messages:[{role:"user",content:prompt}]
})

})

let data=await res.json()

document.getElementById("output").value=data.choices?.[0]?.message?.content || "Error OpenAI"

}


/* DEEPSEEK */

if(provider==="deepseek"){

if(!deepseek){
document.getElementById("output").value="DeepSeek API key belum dimasukkan"
return
}

let res=await fetch("https://api.deepseek.com/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+deepseek
},

body:JSON.stringify({
model:model || "deepseek-chat",
messages:[{role:"user",content:prompt}]
})

})

let data=await res.json()

document.getElementById("output").value=data.choices?.[0]?.message?.content || "Error DeepSeek"

}


/* GEMINI */

if(provider==="gemini"){

if(!gemini){
document.getElementById("output").value="Gemini API key belum dimasukkan"
return
}

let res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key="+gemini,
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{text:prompt}
]
}

]

})

})

let data=await res.json()

document.getElementById("output").value=data.candidates?.[0]?.content?.parts?.[0]?.text || "Error Gemini"

}

}catch(e){

document.getElementById("output").value="Request API gagal"

}

}


/* ================= UTIL ================= */

function copyText(){

let text=document.getElementById("output")

text.select()

document.execCommand("copy")

}

function clearText(){

document.getElementById("output").value=""

}

function downloadText(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="prompt.txt"

a.click()

}

</script>

</body>
</html>
